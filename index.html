<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ny-note</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        background: #ffffff;
        color: #111827;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .container {
        max-width: 760px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }
      h1 {
        margin: 0 0 20px;
        font-size: 2rem;
        font-weight: 800;
      }
      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 14px;
      }
      .btn {
        border: 1px solid #d1d5db;
        background: #fff;
        color: #111827;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        cursor: pointer;
      }
      .btn-primary {
        background: #111827;
        border-color: #111827;
        color: #fff;
      }
      textarea,
      input[type="search"] {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #d1d5db;
        border-radius: 12px;
        padding: 12px;
        font-size: 16px;
        line-height: 1.5;
      }
      textarea {
        min-height: 220px;
        resize: vertical;
      }
      #listSection {
        margin-top: 18px;
      }
      .notes {
        display: grid;
        gap: 10px;
        margin-top: 10px;
      }
      .card {
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 12px;
      }
      .meta {
        margin-top: 8px;
        color: #6b7280;
        font-size: 13px;
      }
      .card-actions {
        margin-top: 10px;
      }
      .empty {
        margin-top: 12px;
        color: #6b7280;
      }
      @media (max-width: 640px) {
        h1 {
          font-size: 1.8rem;
        }
        .container {
          padding-top: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>ny-note</h1>

      <div class="button-row">
        <a
          class="btn"
          href="https://keep.google.com/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Google Keep を開く"
          >Google Keep</a
        >
        <a
          class="btn"
          href="https://app.simplenote.com/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Simplenote を開く"
          >Simplenote</a
        >
        <button id="toggleListBtn" type="button" class="btn" aria-label="一覧表示を切り替える">
          一覧表示
        </button>
      </div>

      <textarea id="noteInput" placeholder="メモを入力" aria-label="メモ入力"></textarea>
      <div class="button-row" style="margin-top: 10px; margin-bottom: 0">
        <button id="saveBtn" type="button" class="btn btn-primary" aria-label="メモを保存">
          保存
        </button>
      </div>

      <section id="listSection" hidden>
        <input id="searchInput" type="search" placeholder="検索" aria-label="メモ検索" />
        <div id="notesContainer" class="notes"></div>
      </section>
    </main>

    <script>
      (function () {
        const NOTES_KEY = "ny-note-notes";
        const DRAFT_KEY = "ny-note-draft";

        const noteInput = document.getElementById("noteInput");
        const searchInput = document.getElementById("searchInput");
        const toggleListBtn = document.getElementById("toggleListBtn");
        const saveBtn = document.getElementById("saveBtn");
        const listSection = document.getElementById("listSection");
        const notesContainer = document.getElementById("notesContainer");

        let notes = [];
        let listVisible = false;

        function getNotes() {
          try {
            const parsed = JSON.parse(localStorage.getItem(NOTES_KEY) || "[]");
            return Array.isArray(parsed) ? parsed : [];
          } catch {
            return [];
          }
        }

        function saveNotes(nextNotes) {
          notes = nextNotes;
          localStorage.setItem(NOTES_KEY, JSON.stringify(nextNotes));
        }

        function normalize(text) {
          return text.trim().toLowerCase();
        }

        function renderNotes() {
          const keyword = normalize(searchInput.value || "");
          const filtered = keyword
            ? notes.filter((note) => note.text.toLowerCase().includes(keyword))
            : notes;

          if (filtered.length === 0) {
            notesContainer.innerHTML = '<p class="empty">該当するメモはありません</p>';
            return;
          }

          notesContainer.innerHTML = filtered
            .map(
              (note) => `
                <article class="card">
                  <div>${note.text.replace(/</g, "&lt;").replace(/\n/g, "<br>")}</div>
                  <div class="meta">更新日時: ${new Date(note.updatedAt).toLocaleString("ja-JP")}</div>
                  <div class="card-actions">
                    <button class="btn" type="button" data-id="${note.id}" aria-label="メモを削除">削除</button>
                  </div>
                </article>
              `
            )
            .join("");
        }

        noteInput.value = localStorage.getItem(DRAFT_KEY) || "";
        notes = getNotes();

        noteInput.addEventListener("input", (event) => {
          localStorage.setItem(DRAFT_KEY, event.target.value);
        });

        saveBtn.addEventListener("click", () => {
          const text = noteInput.value.trim();
          if (!text) return;

          const newNote = {
            id: Date.now(),
            text,
            updatedAt: new Date().toISOString(),
          };

          saveNotes([newNote, ...notes]);
          noteInput.value = "";
          localStorage.removeItem(DRAFT_KEY);
          if (listVisible) renderNotes();
        });

        toggleListBtn.addEventListener("click", () => {
          listVisible = !listVisible;
          listSection.hidden = !listVisible;
          toggleListBtn.textContent = listVisible ? "一覧を閉じる" : "一覧表示";
          if (listVisible) renderNotes();
        });

        searchInput.addEventListener("input", renderNotes);

        notesContainer.addEventListener("click", (event) => {
          const target = event.target;
          if (!(target instanceof HTMLButtonElement)) return;
          const id = Number(target.dataset.id);
          const next = notes.filter((note) => note.id !== id);
          saveNotes(next);
          renderNotes();
        });
      })();
    </script>
  </body>
</html>
