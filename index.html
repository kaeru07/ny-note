<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ny-note</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        max-width: 720px;
        margin: 40px auto;
        padding: 0 16px;
        color: #1f2937;
      }
      h1 {
        margin-bottom: 8px;
      }
      p {
        margin-top: 0;
        color: #4b5563;
      }
      textarea {
        width: 100%;
        min-height: 280px;
        border-radius: 10px;
        border: 1px solid #d1d5db;
        padding: 12px;
        font-size: 16px;
        line-height: 1.5;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <h1>ny-note</h1>
    <p>Vercel公開確認用のメモ欄です（Helloページから更新済み）。</p>
    <textarea placeholder="ここにメモを書いてください"></textarea>
  </body>
</html>
