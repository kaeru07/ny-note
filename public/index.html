<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ny-note</title>
    <style>
      :root {
        --bg: #ffffff;
        --text: #111827;
        --subtext: #6b7280;
        --line: #e5e7eb;
        --line-strong: #d1d5db;
        --primary: #111827;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .app {
        max-width: 860px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }
      .app-title {
        margin: 0 0 18px;
        font-size: clamp(1.9rem, 4vw, 2.4rem);
        line-height: 1.2;
        font-weight: 800;
        letter-spacing: -0.02em;
      }
      .toolbar {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }
      .btn {
        border-radius: 999px;
        border: 1px solid var(--line-strong);
        background: #fff;
        color: var(--text);
        font-weight: 600;
        font-size: 14px;
        padding: 9px 14px;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
      .btn-primary {
        border-color: var(--primary);
        background: var(--primary);
        color: #fff;
      }
      .editor {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px;
      }
      textarea,
      input[type='search'] {
        width: 100%;
        border-radius: 12px;
        border: 1px solid var(--line-strong);
        padding: 12px;
        font-size: 16px;
        line-height: 1.5;
        font-family: inherit;
      }
      textarea {
        min-height: 230px;
        resize: vertical;
      }
      .save-row {
        margin-top: 10px;
        display: flex;
        justify-content: flex-end;
      }
      .list {
        margin-top: 18px;
      }
      .cards {
        margin-top: 12px;
        display: grid;
        gap: 12px;
      }
      .card {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 14px;
      }
      .card-text {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .card-meta {
        margin-top: 10px;
        color: var(--subtext);
        font-size: 12px;
      }
      .card-actions {
        margin-top: 10px;
      }
      .empty {
        color: var(--subtext);
        margin: 8px 0 0;
      }
      @media (max-width: 600px) {
        .app {
          padding: 18px 14px 30px;
        }
        .toolbar {
          gap: 8px;
        }
        .btn {
          padding: 8px 12px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <h1 class="app-title">ny-note</h1>

      <div class="toolbar">
        <a
          class="btn"
          href="https://keep.google.com/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Google Keep を開く"
          >Google Keep</a
        >
        <a
          class="btn"
          href="https://app.simplenote.com/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Simplenote を開く"
          >Simplenote</a
        >
        <button id="toggleBtn" class="btn" type="button" aria-label="一覧表示を切り替える">一覧表示</button>
      </div>

      <section class="editor">
        <textarea id="draftInput" placeholder="メモを入力" aria-label="メモ入力"></textarea>
        <div class="save-row">
          <button id="saveBtn" class="btn btn-primary" type="button" aria-label="メモを保存">保存</button>
        </div>
      </section>

      <section id="listSection" class="list" hidden>
        <input id="searchInput" type="search" placeholder="検索" aria-label="メモ検索" />
        <div id="cards" class="cards"></div>
      </section>
    </main>

    <script>
      const STORAGE_KEYS = {
        notes: "ny-note-notes",
        draft: "ny-note-draft",
      };

      function safeLoadNotes() {
        try {
          const parsed = JSON.parse(localStorage.getItem(STORAGE_KEYS.notes) || "[]");
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return [];
        }
      }

      function saveNotes(notes) {
        localStorage.setItem(STORAGE_KEYS.notes, JSON.stringify(notes));
      }

      function normalizeKeyword(value) {
        return value.trim().toLowerCase();
      }

      function createCard(note) {
        const article = document.createElement("article");
        article.className = "card";

        const text = document.createElement("p");
        text.className = "card-text";
        text.textContent = note.text;

        const meta = document.createElement("div");
        meta.className = "card-meta";
        meta.textContent = `更新日時: ${new Date(note.updatedAt).toLocaleString("ja-JP")}`;

        const actions = document.createElement("div");
        actions.className = "card-actions";

        const removeBtn = document.createElement("button");
        removeBtn.className = "btn";
        removeBtn.type = "button";
        removeBtn.textContent = "削除";
        removeBtn.setAttribute("aria-label", "メモを削除");
        removeBtn.dataset.id = String(note.id);

        actions.appendChild(removeBtn);
        article.append(text, meta, actions);
        return article;
      }

      function createNote(text) {
        return {
          id: Date.now(),
          text,
          updatedAt: new Date().toISOString(),
        };
      }

      (function bootstrap() {
        const draftInput = document.getElementById("draftInput");
        const saveBtn = document.getElementById("saveBtn");
        const toggleBtn = document.getElementById("toggleBtn");
        const listSection = document.getElementById("listSection");
        const searchInput = document.getElementById("searchInput");
        const cards = document.getElementById("cards");

        let notes = safeLoadNotes();
        let isListOpen = false;

        function renderList() {
          const keyword = normalizeKeyword(searchInput.value);
          const shownNotes = keyword
            ? notes.filter((note) => note.text.toLowerCase().includes(keyword))
            : notes;

          cards.innerHTML = "";
          if (shownNotes.length === 0) {
            const empty = document.createElement("p");
            empty.className = "empty";
            empty.textContent = "該当するメモはありません";
            cards.appendChild(empty);
            return;
          }

          shownNotes.forEach((note) => cards.appendChild(createCard(note)));
        }

        draftInput.value = localStorage.getItem(STORAGE_KEYS.draft) || "";

        draftInput.addEventListener("input", (event) => {
          localStorage.setItem(STORAGE_KEYS.draft, event.target.value);
        });

        saveBtn.addEventListener("click", () => {
          const trimmed = draftInput.value.trim();
          if (!trimmed) return;

          notes = [createNote(trimmed), ...notes];
          saveNotes(notes);

          draftInput.value = "";
          localStorage.removeItem(STORAGE_KEYS.draft);

          if (isListOpen) {
            renderList();
          }
        });

        toggleBtn.addEventListener("click", () => {
          isListOpen = !isListOpen;
          listSection.hidden = !isListOpen;
          toggleBtn.textContent = isListOpen ? "一覧を閉じる" : "一覧表示";
          if (isListOpen) {
            renderList();
          }
        });

        searchInput.addEventListener("input", renderList);

        cards.addEventListener("click", (event) => {
          const button = event.target.closest("button[data-id]");
          if (!button) return;

          const id = Number(button.dataset.id);
          notes = notes.filter((note) => note.id !== id);
          saveNotes(notes);
          renderList();
        });
      })();
    </script>
  </body>
</html>
